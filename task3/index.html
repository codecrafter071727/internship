<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Lead Capture - Task 3</title>
    <link rel="stylesheet" href="css/task3.css">
</head>
<body>
    <main class="container">
        <nav class="breadcrumb">
            <a href="../index.html">← Back to Home</a>
        </nav>

        <header>
            <h1>Product Demo</h1>
            <p>Watch the 6-second teaser to unlock our exclusive offer.</p>
        </header>

        <div class="video-wrapper">
            <div id="player"></div>
        </div>
        <button id="mobile-play-btn" class="mobile-play-btn" type="button">Tap to play video</button>

        <!-- Lead Modal -->
        <div id="lead-modal" class="modal">
            <div class="modal-overlay" data-close></div>
            <div class="modal-content">
                <button class="close-btn" data-close>&times;</button>
                
                <div class="modal-header">
                    <h2>Get the Full Version</h2>
                    <p>Enter your details below to continue watching.</p>
                </div>

                <form id="lead-form">
                    <div class="field">
                        <label>Full Name</label>
                        <input type="text" id="name" name="name" placeholder="John Doe">
                        <span class="error" id="name-error"></span>
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="email" id="email" name="email" placeholder="john@example.com">
                        <span class="error" id="email-error"></span>
                    </div>
                    <div class="field">
                        <label>Phone</label>
                        <input type="tel" id="phone" name="phone" placeholder="123-456-7890">
                        <span class="error" id="phone-error"></span>
                    </div>
                    <div class="field">
                        <label>Company</label>
                        <input type="text" id="company" name="company" placeholder="ACME Corp">
                        <span class="error" id="company-error"></span>
                    </div>
                    <button type="submit" class="btn">Submit</button>
                </form>

                <div id="success-message" class="hidden">
                    <h3>Success!</h3>
                    <p>We'll be in touch shortly. Closing in a few seconds...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
